name: BioSpectator Daily Crawler

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 평일 오전 9:30 KST (UTC+9 → UTC 00:30)
  workflow_dispatch:          # 수동 실행 버튼 (테스트용)

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 크롤러 실행
        env:
          BIOS_ID:            ${{ secrets.BIOS_ID }}
          BIOS_PW:            ${{ secrets.BIOS_PW }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python biospectator_crawler.py

      - name: docs/index.html 커밋 & 푸시 (GitHub Pages 업데이트)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: 리포트 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
